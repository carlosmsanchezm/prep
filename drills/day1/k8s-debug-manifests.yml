# Day 1: Debug Kubernetes Manifests
# This file has 8 bugs across 3 resources. Find them all.
# Write the bug number and what's wrong next to each one.
# Don't apply it — just read and spot the issues.

---
# Resource 1: Deployment
apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web
          image: registry.local/web-app:latest
          ports:
            - containerPort: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 50m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: web-port
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080

---
# Resource 2: Service
apiVersion: v1
kind: Service
metadata:
  name: web-app-svc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: tcp
  type: clusterIP

---
# Resource 3: NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-traffic
spec:
  podSelector:
    matchLabels:
      app: web-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: frontend
      ports:
        - port: 80
          protocol: TCP
