# ============================================================
# Part 2: DEBUG — Find 5 bugs in this StatefulSet + Service
# ============================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres-headless
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: postgres
          image: postgres:16
          port:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: supersecret123
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10G
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
spec:
  clusterIP: none
  selector:
    app: postgres
  ports:
    - port: 5432

