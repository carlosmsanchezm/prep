# Day 4 ANSWERS: RBAC

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-sa
  namespace: cicd

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: cicd
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]                  # "" = core API group
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer-binding
  namespace: cicd
subjects:
  - kind: ServiceAccount
    name: deploy-sa
    namespace: cicd
roleRef:
  kind: Role
  name: deployer
  apiGroup: rbac.authorization.k8s.io

# KEY POINTS:
# - apiGroups: [""] is the CORE group (pods, services, configmaps, secrets)
# - apiGroups: ["apps"] is for deployments, statefulsets, daemonsets, replicasets
# - apiGroups: ["rbac.authorization.k8s.io"] is for roles, bindings
# - roleRef.apiGroup MUST be "rbac.authorization.k8s.io" (easy to forget)
# - subjects.namespace is required for ServiceAccount (unlike User/Group)
